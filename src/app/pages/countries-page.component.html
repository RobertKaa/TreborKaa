<main class="countries-shell">
  <section class="header-card">
    <div>
      <p class="eyebrow">Catalogue</p>
      <h1>Tous les pays</h1>
      <p class="intro">
        Liste triable par nom de pays ou nom de capitale.
      </p>
    </div>

    <div class="sort-controls" role="group" aria-label="Tri de la liste">
      <button
        type="button"
        [class.active]="sortKey() === 'name'"
        (click)="setSortKey('name')"
      >
        Trier par pays
      </button>
      <button
        type="button"
        [class.active]="sortKey() === 'capital'"
        (click)="setSortKey('capital')"
      >
        Trier par capitale
      </button>
    </div>
  </section>

  <section class="table-card">
    @if (countries$ | async; as countries) {
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Drapeau</th>
              <th>Pays</th>
              <th>Capitale</th>
            </tr>
          </thead>
          <tbody>
            @for (country of sortCountries(countries); track country.code) {
              <tr>
                <td class="flag-cell">
                  <img [src]="country.flagUrl" [alt]="'Drapeau de ' + country.nameFrench" />
                </td>
                <td>{{ country.nameFrench }}</td>
                <td>{{ country.capitalFrench }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    } @else {
      <p class="loading">Chargement des pays...</p>
    }
  </section>
</main>
