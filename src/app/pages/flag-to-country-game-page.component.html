<app-classic-name-question
  [question]="currentQuestion()"
  labelKey="classic.questionFlagToCountry"
  prompt="flag"
  [optionState]="getOptionStateForCode"
  [optionDisabled]="isOptionDisabledForCode"
  (selectCode)="selectAnswer($event)"
/>

<app-classic-quiz-status
  [showProgress]="!!currentQuestion()"
  [showSummary]="isComplete()"
  [progressLabel]="progressLabel()"
  [progressPercent]="progressPercent()"
  [score]="score()"
  [wrongAttempts]="wrongAttempts()"
  [errorsLimit]="getErrorsLimit()"
  (close)="closeSummary()"
  (restart)="restartGame()"
>
  <app-classic-quiz-mistakes [errors]="errors()" prompt="flag" />
</app-classic-quiz-status>
